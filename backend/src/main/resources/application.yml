spring:
  application:
    name: streamflix-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  error:
    include-message: always
  compression:
    enabled: true
    mime-types: application/json,text/html,text/plain
  tomcat:
    max-threads: 200
    accept-count: 100

# Application-specific properties
app:
  jwt:
    # Base64-encoded 256-bit key. Replace via APP_JWT_SECRET env var in production.
    secret: ${APP_JWT_SECRET:Y2hhbmdlLW1lLXBsZWFzZS1jaGFuZ2UtbWUtcGxlYXNlLWNoYW5nZS1tZQ==}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.streamflix: DEBUG

---
# ====================== DEV (default) — H2 in-memory ======================
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:streamflix;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2
  flyway:
    enabled: false   # H2 ddl-auto handles dev schema

---
# ============================ PRODUCTION ===================================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:streamflix_db}?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
    username: ${DB_USERNAME:streamflix}
    password: ${DB_PASSWORD:streamflix}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate            # schema is owned by Flyway
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

---
# ============================ TEST =========================================
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:streamflix-test;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
app:
  jwt:
    secret: dGVzdC1zZWNyZXQta2V5LXRoYXQtaXMtMzItYnl0ZXMtbG9uZyEhIQ==
    expiration-ms: 3600000
