# StreamFlix production stack: MySQL + Spring Boot backend
#
# Usage:
#   docker compose up -d
#   docker compose logs -f backend
#   docker compose down -v   # also wipes the database volume
#
# Host ports default to 3307 / 8081 to avoid conflicting with a local MySQL
# (3306) or a Spring Boot dev server (8080). Override in .env if you need
# different values:
#   MYSQL_HOST_PORT=3308
#   BACKEND_HOST_PORT=9000

services:
  mysql:
    image: mysql:8.4
    container_name: streamflix-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE:      ${DB_NAME:-streamflix_db}
      MYSQL_USER:          ${DB_USERNAME:-streamflix}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-streamflix}
    command: ["--character-set-server=utf8mb4",
              "--collation-server=utf8mb4_unicode_ci",
              "--default-time-zone=+00:00",
              "--log-bin-trust-function-creators=1"]
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpw}"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: streamflix-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST:     mysql
      DB_PORT:     "3306"
      DB_NAME:     ${DB_NAME:-streamflix_db}
      DB_USERNAME: ${DB_USERNAME:-streamflix}
      DB_PASSWORD: ${DB_PASSWORD:-streamflix}
      APP_JWT_SECRET:        ${APP_JWT_SECRET:-Y2hhbmdlLW1lLXBsZWFzZS1jaGFuZ2UtbWUtcGxlYXNlLWNoYW5nZS1tZQ==}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS:-86400000}
    ports:
      - "${BACKEND_HOST_PORT:-8081}:8080"

volumes:
  mysql-data:
